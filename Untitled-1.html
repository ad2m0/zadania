<script>
var x=8;
var y=15;
document.write("Liczba "+x+"= 1000");
document.write("<br>Liczba "+y+"= 1111");
document.write("<br>8 & 15 = "  +(x&y)+", czyli 1000");
document.write("<br>8 & 15 = "  +(x^y)+", czyli 0111");
document.write("<br>8 | 15 = "  +(x|y)+", czyli 1111");
document.write("<br>8 << 2 = " +(x<<2)+", czyli 100000");
</script>
