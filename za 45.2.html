<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>obsługa formularzy</title>

<script>
function pobierz()
{
    var f = document.forms[0]; 
    var napis = "\n";
    var braki = false;

    if (f.imie.value == "")
    {
        napis += "imie\n";
        braki = true;
    }

    if (f.nazw.value == "")
    {
        napis += "nazwisko\n";
        braki = true;
    }

    if (f.data.value == "")
    {
        napis += "data urodzenia\n";
        braki = true;
    }

    if (braki == false)
        alert("Wprowadziłeś wszystkie dane");
    else
        alert("Brakuje następujących danych:\n" + napis);
}
</script>

</head>

<body>
<form method="post" name="form2">
<table>
<tr>
    <td>Podaj swoje imię:</td>
    <td><input type="text" name="imie"></td>
</tr>

<tr>
    <td>Podaj swoje nazwisko:</td>
    <td><input type="text" name="nazw"></td>
</tr>

<tr>
    <td>Podaj rok urodzenia:</td>
    <td><input type="date" name="data"></td>
</tr>

<tr>
    <td colspan="2" align="right">
        <input type="button" name="pl" value="Kliknij" onclick="pobierz()">
    </td>
</tr>
</table>
</form>

</body>
</html>
