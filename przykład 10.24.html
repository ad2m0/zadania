<!DOCTYPE html>
<html>
<head>
    <title>Rzym i jego zabytki</title>
    <meta charset="utf-8">
    <style>
        img {
            width: 200px;
            height: 200px;
        }

        table {
            width: 700px;
            height: 300px;
            border: 8px #0066FF groove;
            caption-side: top;
            border-collapse: collapse;
        }

        td {
            text-align: center;
            vertical-align: middle;
            border: 1px grey solid;
            color: #0066CC;
            font-size: large;
        }

        .zdj {
            background-color: #FFFF99;
        }
    </style>
</head>
<body>
    <table>
        <caption>Zabytki Rzymu</caption>
        <tr>
            <td class="zdj"><img src="koloseum.jpg"></td>
            <td class="zdj"><img src="fontanna.jpg"></td>
            <td class="zdj"><img src="bazylika.jpg"></td>
        </tr>
        <tr>
            <td>Koloseum</td>
            <td>Fontanna di Trevi</td>
            <td>Bazylika Św. Piotra</td>
        </tr>
    </table>
</body>
</html>
