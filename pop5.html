<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizytówka użytkownika</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .wizytowka {
            background-color: #ffffff;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }
        .wizytowka h2 {
            margin-bottom: 10px;
            color: #333;
        }
        .wizytowka p {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>
    <script>
        // Pobranie danych od użytkownika
        let imie = prompt("Podaj swoje imię:");
        let nazwisko = prompt("Podaj swoje nazwisko:");

        // Utworzenie wizytówki
        document.write(`
            <div class="wizytowka">
                <h2>Wizytówka użytkownika</h2>
                <p><strong>Imię:</strong> ${imie}</p>
                <p><strong>Nazwisko:</strong> ${nazwisko}</p>
            </div>
        `);
    </script>
</body>
</html>
