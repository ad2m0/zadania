
    <script>
        alert("Witaj w mini kalkulatorze");
       var a = Number(prompt("podaj pierwszą liczbę:"));
       var b = Number(prompt("podaj drugą liczbę:"));
         suma = a + b;
         różnica = a - b;
         iloczyn = a * b ;
         iloraz = a / b;
         reszta = a % b;
         alert(
        "\nSuma"+suma+ 
        "\nRóżnica"+różnica+
        "\nIloczyn"+iloczyn+
        "\nIloraz"+iloraz+
        "\nReszta"+reszta );
    </script>
