<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Tworzenie tabel za pomoca pętli</title>
        <style>
            table,tr,td
            {
                border:1px solid blue;
            }
            table
            {
                width:50px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <script>
            var i=1,a;
            document.write("<table>");
                do
                {
                    a=parseInt(Math.random()*100+1);
                    document.write("<tr><td>"+a+"</td></tr>");
                    i++;
                }while(i<=10);
                document.write("</table>");
        </script>
    </body>
</html>
