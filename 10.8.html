<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <style>
        /*Pierwsze litery wyrazów wielkie */ 
        h1{
            color: green;
            text-transform: capitalize;
        }
        /*Wszystkie litery tekstu wielkie*/ 
        h2 
        {
            color: red;
            text-transform: uppercase;
        }
        /*Wszystkie litery tekstu małe*/ 
        h3 
        {
            color:#3344ff;
            text-transform:lowercase ;
        }
        </style>
        </head>
        <body>
            <h1> Nagłówek pierwszego stopnia </h1>
            <h2> Nagłówek drugiego stopnia </h2>
            <h3> Nagłówek trzeciego stopnia</h3>
        </body>
        </html>
