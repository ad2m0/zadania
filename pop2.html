<html>
    <head>
        <meta charset="UTF-8">
        <title>Definiowanie zmiennych</title>
    </head>
    <body>
        <script>
            var x=5;      //definicja zmiennej x
            var y=7;      //definicja zmiennej y
            var k;        //definicja zmiennej k
            k=x+y;        //definicja przypisania
            alert("wartość k wynosi " +k);
            </Script>
    </body>
</html>
