<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>obliczanie średniej</title>
</head>
<body>
    <script>
        // pobranie trzech liczb od użytkownika
        let liczba1 = parseFloat(prompt("podaj pierwszą liczbę"));
        let liczba2 = parseFloat(prompt("podaj drugą liczbę"));
        let liczba3 = parseFloat(prompt("podaj trzecią liczbę"));
        //obliczanie średniej
        let srednia = (liczba1 + liczba2 + liczba3) /3;
        //wyświetlenie wyniku
        alert("średnia z podanych liczb to: " + srednia.toFixed(2));
        </script>
</body>
</html>
