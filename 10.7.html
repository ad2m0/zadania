<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <style>
        /*Paragraf kolorem zielonym, tekst przekreślony*/ 
        p{
            color: green;
            text-decoration: line-through;
        }
        /*Nagłówek pierwszego stopnia podkreślony linia falowaną koloru czerwonego*/ 
        h1
        {
            text-decoration: underline red wavy;
        }
        /* Nagłówek drugiego stopnia z przerywana linią nad tekstem*/ 
        h2 
        {text-decoration: overline blue dashed;
        }
        </style>
        </head>
        <body>
            <p>Tekst pierwszego akapitu</p>
            <h1>Nagłówek pierwszego stopnia</h1>
            <h2>Nagłówek drugiego stopnia<h2>
            </body>
            </html>
